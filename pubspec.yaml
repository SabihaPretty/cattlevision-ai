name: cattlevision_ai
description: "AI Based Smart Cattle Biometric Identification & Health Monitoring System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  percent_indicator: ^4.2.5
  http: ^1.6.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo/

flutter_native_splash:
  color: "#07111F"
  image: assets/logo/cattlevision_logo.png
  android: true
  ios: true
  web: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/cattlevision_logo.png"
  min_sdk_android: 21